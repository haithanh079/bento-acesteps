service: "bentoml_service.openai_compatible_service:ACEStepOpenAIService"
include:
  - "bentoml_service/**/*.py"
  - "acestep/**/*.py"
  - "examples/**/*.json"
  - "config/**/*.json"
python:
  requirements_txt: "./requirements_bentoml.txt"
docker:
  distro: "debian"
  python_version: "3.11"
  setup_script: "./setup_bentoml.py"
  system_packages:
    - "python3"
    - "python3-pip"
    - "python3-dev"
    - "python3-venv"
    - "python3-setuptools"
    - "python3-wheel"
    - "ffmpeg"
    - "libsndfile1"
    - "libsndfile1-dev"
    - "libasound2-dev"
    - "portaudio19-dev"
    - "curl"
    - "wget"
    - "build-essential"
    - "gcc"
    - "g++"
    - "make"
    # Additional packages for CLIP models
    - "git"
    - "pkg-config"
    - "libhdf5-dev"
  env:
    CUDA_VISIBLE_DEVICES: "0"
    TOKENIZERS_PARALLELISM: "false"
    OPENAI_API_BASE: "http://localhost:3000"
    OPENAI_API_KEY: "sk-ace-steps"
    # Additional environment variables for CLIP models
    HF_HUB_DISABLE_TELEMETRY: "1"
    TRANSFORMERS_CACHE: "/tmp/transformers_cache"
    HF_HOME: "/tmp/huggingface"
labels:
  service: "ace-step-openai"
  version: "1.0.0"
  description: "ACE-Steps OpenAI-Compatible Audio Generation Service"
  openai_compatible: "true"
  api_version: "v1"
