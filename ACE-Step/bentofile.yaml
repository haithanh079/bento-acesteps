service: "service:acestepaudoservice"
labels:
  owner: bentoml-team
  project: ace-step-audio
  framework: pytorch
  use-case: audio-generation
description: "OpenAI-compatible BentoML service for ACE-Step audio generation from text prompts"
include:
  - "service.py"
  - "config.py"
  - "acestep/"
  - "requirements-bentoml.txt"
  - "setup.sh"
exclude:
  - "__pycache__/"
  - "*.pyc"
  - ".git/"
  - "*.log"
  - "outputs/"
  - "examples/"
  - "assets/"
  - "*.ipynb"
  - "test_*"
python:
  requirements_txt: "./requirements-bentoml.txt"
  lock_packages: false
  index_url: "https://pypi.org/simple"
docker:
  distro: debian
  python_version: "3.10"
  cuda_version: "11.8"
  system_packages:
    - git
    - wget
    - curl
    - ffmpeg
    - sox
    - libsndfile1
  env:
    - TOKENIZERS_PARALLELISM=false
    - CUDA_VISIBLE_DEVICES=0
    - PYTHONUNBUFFERED=1
    - HF_HUB_CACHE=/tmp/huggingface_cache
  setup_script: "./setup.sh"
